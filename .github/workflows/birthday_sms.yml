name: Birthday SMS

on:
  schedule:
    # 6 AM SAST = 4 AM UTC (SAST is UTC+2)
    - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send-birthday-sms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyJWT requests twilio

      - name: Run birthday SMS script
        env:
          LOOPY_API_KEY: ${{ secrets.LOOPY_API_KEY }}
          LOOPY_API_SECRET: ${{ secrets.LOOPY_API_SECRET }}
          LOOPY_CAMPAIGN_ID: ${{ secrets.LOOPY_CAMPAIGN_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
        run: python birthday_sms.py
